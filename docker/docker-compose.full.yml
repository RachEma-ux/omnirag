version: "3.9"

# OmniRAG — Full backing services
# Port registry: 8100–8199 (see .env.example and docs/PORT-REGISTRY.md)
# Usage: docker-compose --env-file .env.example -f docker/docker-compose.full.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: omnirag-postgres
    ports:
      - "${POSTGRES_PORT:-8160}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnirag}
      POSTGRES_USER: ${POSTGRES_USER:-omnirag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnirag}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnirag}"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: omnirag-neo4j
    ports:
      - "${NEO4J_BOLT_PORT:-8110}:7687"
      - "${NEO4J_HTTP_PORT:-8111}:7474"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/omnirag}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: omnirag-qdrant
    ports:
      - "${QDRANT_PORT:-8120}:6333"
      - "${QDRANT_GRPC_PORT:-8121}:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: omnirag-elasticsearch
    ports:
      - "${ELASTICSEARCH_PORT:-8130}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omnirag-redis
    ports:
      - "${REDIS_PORT:-8140}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: omnirag-ollama
    ports:
      - "${OLLAMA_PORT:-8150}:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  neo4jdata:
  qdrantdata:
  esdata:
  redisdata:
  ollamadata:
