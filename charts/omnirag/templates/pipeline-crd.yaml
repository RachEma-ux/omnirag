apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pipelines.omnirag.io
spec:
  group: omnirag.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                yaml:
                  type: string
                  description: Pipeline YAML definition
                replicas:
                  type: integer
                  default: 1
                strategy:
                  type: string
                  enum: [single, fallback, ensemble, vote]
                  default: single
  scope: Namespaced
  names:
    plural: pipelines
    singular: pipeline
    kind: Pipeline
    shortNames:
      - pl
