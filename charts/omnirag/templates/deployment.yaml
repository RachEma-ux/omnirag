apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-omnirag
  labels:
    app: omnirag
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: omnirag
  template:
    metadata:
      labels:
        app: omnirag
    spec:
      containers:
        - name: omnirag
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8100
              protocol: TCP
          env:
            - name: OMNIRAG_API_KEYS
              value: "{{ .Values.env.OMNIRAG_API_KEYS }}"
            - name: OMNIRAG_RATE_LIMIT
              value: "{{ .Values.env.OMNIRAG_RATE_LIMIT }}"
            {{- if .Values.qdrant.enabled }}
            - name: QDRANT_URL
              value: "{{ .Values.qdrant.url }}"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 30
