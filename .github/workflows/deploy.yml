name: Deploy OmniRAG

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Tunnel duration in minutes'
        required: false
        default: '30'

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Cloudflare tunnel
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Start OmniRAG with tunnel
        env:
          OMNIRAG_HOST: "0.0.0.0"
          OMNIRAG_PORT: "8100"
          QDRANT_URL: "http://localhost:6333"
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.OMNIRAG_GIST_ID }}
        run: |
          set -e

          echo "🚀 Starting OmniRAG server..."
          omnirag serve --host 0.0.0.0 --port 8100 &
          SERVER_PID=$!

          echo "⏳ Waiting for server health..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8100/health > /dev/null 2>&1; then
              echo "✅ Server healthy"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "❌ Server exited"
              exit 1
            fi
            echo "  attempt $i/15..."
            sleep 2
          done

          if ! curl -sf http://localhost:8100/health > /dev/null 2>&1; then
            echo "❌ Server not healthy after 30s"
            exit 1
          fi

          echo "🔧 API info:"
          curl -s http://localhost:8100/health | python3 -m json.tool

          echo ""
          echo "🌐 Starting Cloudflare tunnel..."
          cloudflared tunnel --url http://localhost:8100 --no-autoupdate > /tmp/tunnel.log 2>&1 &
          TUNNEL_PID=$!

          echo "⏳ Waiting for tunnel URL..."
          TUNNEL_URL=""
          for i in $(seq 1 20); do
            TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log | head -1 || true)
            if [ -n "$TUNNEL_URL" ]; then
              break
            fi
            sleep 3
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Tunnel URL not found"
            cat /tmp/tunnel.log
            exit 1
          fi

          echo ""
          echo "════════════════════════════════════════════"
          echo "  OmniRAG v4 is LIVE"
          echo "  $TUNNEL_URL"
          echo "  API docs: $TUNNEL_URL/docs"
          echo "════════════════════════════════════════════"
          echo ""

          # Update gist if configured
          if [ -n "$GIST_TOKEN" ] && [ -n "$GIST_ID" ]; then
            PAYLOAD=$(python3 -c "
          import json, time
          print(json.dumps({
            'files': {
              'omnirag-tunnel.json': {
                'content': json.dumps({
                  'tunnel_url': '$TUNNEL_URL',
                  'api_docs': '$TUNNEL_URL/docs',
                  'health': '$TUNNEL_URL/health',
                  'updated_at': time.strftime('%Y-%m-%dT%H:%M:%SZ'),
                  'status': 'running'
                }, indent=2)
              }
            }
          }))
          ")
            curl -s -X PATCH \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/gists/$GIST_ID" \
              -d "$PAYLOAD" > /dev/null
            echo "📋 Gist updated with tunnel URL"
          fi

          # Keep alive
          DURATION=${{ github.event.inputs.duration }}
          echo "⏰ Tunnel active for ${DURATION} minutes..."
          sleep $((DURATION * 60))

          echo "🛑 Shutting down..."
          kill $TUNNEL_PID $SERVER_PID 2>/dev/null || true
