name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check omnirag/ tests/

      - name: Type check with mypy
        run: mypy omnirag/ --ignore-missing-imports
        continue-on-error: true

      - name: Security scan with bandit
        run: bandit -r omnirag/ -s B101

      - name: Run tests
        run: pytest --cov=omnirag --cov-report=term-missing -v

      - name: Check coverage
        run: pytest --cov=omnirag --cov-fail-under=70
