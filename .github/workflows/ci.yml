name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: omnirag_test
          POSTGRES_USER: omnirag
          POSTGRES_PASSWORD: omnirag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U omnirag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "wget -q --spider http://localhost:6333/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install asyncpg httpx

      - name: Lint with ruff
        run: ruff check omnirag/ tests/

      - name: Type check with mypy
        run: mypy omnirag/ --ignore-missing-imports
        continue-on-error: true

      - name: Security scan with bandit
        run: bandit -r omnirag/ -s B101

      - name: Run tests
        env:
          DATABASE_URL: postgresql://omnirag:omnirag@localhost:5432/omnirag_test
          REDIS_ADDR: localhost:6379
          QDRANT_URL: http://localhost:6333
        run: pytest --cov=omnirag --cov-report=term-missing -v

      - name: Check coverage
        env:
          DATABASE_URL: postgresql://omnirag:omnirag@localhost:5432/omnirag_test
          REDIS_ADDR: localhost:6379
          QDRANT_URL: http://localhost:6333
        run: pytest --cov=omnirag --cov-fail-under=50
