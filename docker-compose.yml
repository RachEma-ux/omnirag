services:
  control-plane:
    build: .
    ports:
      - "8100:8100"
    environment:
      - REDIS_URL=redis://cache:6379
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
      - cache

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
